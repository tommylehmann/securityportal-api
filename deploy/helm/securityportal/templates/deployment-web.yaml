#
# securityportal-web Deployment (SvelteKit adapter-node, port 8080).
#
# SECURITYPORTAL_API_INTERNAL_URL points directly at the api ClusterIP Service
# (<release>-api:8081), bypassing the Ingress for SSR server-side fetches
# (same pattern as ADR-0011 Caddy deployment).
#
# PUBLIC_API_BASE_URL is empty so the browser issues relative /api/... requests
# that the Ingress routes to the api Service.  No CORS headers are needed.
#
# The legal dir and logo are mounted from a ConfigMap and a Secret respectively
# when configured.  SECURITYPORTAL_LEGAL_DIR and SECURITYPORTAL_LOGO_PATH are
# set in the ConfigMap only when the corresponding content is configured.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "securityportal.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "securityportal.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "securityportal.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "securityportal.labels" . | nindent 8 }}
        {{- include "securityportal.web.selectorLabels" . | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "securityportal.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ printf "%s:%s" .Values.web.image.repository .Values.web.image.tag | quote }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "securityportal.fullname" . }}-config
          {{- with .Values.web.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.web.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.web.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if (include "securityportal.legalEnabled" .) }}
            # Legal Markdown files (Impressum / Datenschutz).
            # Mounted read-only; the web app reads them at request time via
            # SECURITYPORTAL_LEGAL_DIR.
            - name: legal
              mountPath: {{ .Values.legalContent.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if (include "securityportal.logoEnabled" .) }}
            # Operator-supplied logo image file.
            # Mounted read-only; the web app serves it via /branding/logo.
            - name: logo
              mountPath: {{ .Values.logo.mountPath | quote }}
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if (include "securityportal.legalEnabled" .) }}
        - name: legal
          configMap:
            name: {{ include "securityportal.legalConfigMapName" . }}
        {{- end }}
        {{- if (include "securityportal.logoEnabled" .) }}
        - name: logo
          secret:
            secretName: {{ include "securityportal.logoSecretName" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

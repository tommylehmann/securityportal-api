#
# Logo Secret — generated only when logo.data is set in values and no
# existingSecret is referenced.  Logos may be proprietary assets, so they
# are stored in a Secret rather than a ConfigMap.
{{- if and .Values.logo.data (not .Values.logo.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "securityportal.logoSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "securityportal.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.logo.filename }}: {{ .Values.logo.data }}
{{- end }}

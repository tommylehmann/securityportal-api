#
# Bundled-DB password Secret (dev/demo only).
#
# Generated once on first install and reused on every upgrade: the `lookup`
# reads the live Secret and re-emits its existing values, so the password is
# stable across `helm upgrade`.  resource-policy: keep means `helm uninstall`
# leaves it in place; reinstalling under the same release name re-reads it, so
# the password matches a persisted data volume for that volume's whole life.
#
# The Bitnami subchart consumes this via postgresql.auth.existingSecret; the
# api reads the "password" key (see templates/deployment-api.yaml).  Set
# manageBundledDbSecret=false to manage the Secret yourself.
{{- if and .Values.postgresql.enabled .Values.manageBundledDbSecret }}
{{- $name := .Values.postgresql.auth.existingSecret }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) }}
{{- $userPw := randAlphaNum 24 }}
{{- $adminPw := randAlphaNum 24 }}
{{- if and $existing (index $existing.data "password") (index $existing.data "postgres-password") }}
{{- $userPw = index $existing.data "password" | b64dec }}
{{- $adminPw = index $existing.data "postgres-password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "securityportal.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  password: {{ $userPw | b64enc | quote }}
  postgres-password: {{ $adminPw | b64enc | quote }}
{{- end }}

#
# Database DSN Secret (SA-13 / ADR-0012).
# The DSN may carry a username and password; it must never appear in a
# ConfigMap, pod logs, or API responses.
#
# This Secret is generated only when:
#   - postgresql.enabled=false  (no bundled subchart whose Secret we reuse), AND
#   - externalDatabase.existingSecret is empty  (operator has not pre-created one).
#
# For production deployments prefer externalDatabase.existingSecret and manage
# the Secret outside Helm (e.g. via external-secrets-operator or Vault).
{{- if and (not .Values.postgresql.enabled) (not .Values.externalDatabase.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "securityportal.fullname" . }}-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "securityportal.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from storing the DSN in release metadata in plaintext.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Replace this placeholder with the real DSN before deploying to production.
  # Format: postgres://user:password@host:5432/dbname?sslmode=require
  dsn: {{ .Values.externalDatabase.dsn | default "postgres://securityportal:changeme@db-host:5432/securityportal?sslmode=require" | quote }}
{{- end }}

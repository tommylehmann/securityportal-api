# Build / test gate for securityportal-api.
#
# Runs on every push to the default branch and on every pull request. Green CI
# is the precondition for cutting a release (see release.yml and RELEASING.md).
#
# All third-party actions are pinned to a full commit SHA (supply-chain
# hardening); the trailing comment records the human-readable version that
# Dependabot (.github/dependabot.yml, github-actions ecosystem) keeps current.

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt (check)
        # gofmt -l lists files that are not formatted; any output fails the gate.
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        # Integration tests start their own postgres:16-alpine via testcontainers
        # and skip cleanly when docker is unavailable. GitHub-hosted ubuntu
        # runners ship docker, so the full suite runs here.
        run: go test ./...

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: REUSE lint
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so gitleaks scans the whole commit range, not just the
          # tip — a secret committed and later removed is still a leak.
          fetch-depth: 0

      - name: gitleaks
        # Detects committed secrets/keys. Free for public repositories and
        # personal accounts; no GITLEAKS_LICENSE required.
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

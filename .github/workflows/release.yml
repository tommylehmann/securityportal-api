# Build & publish the securityportal-api release artifacts.
#
# Trigger: pushing an annotated SemVer tag (vX.Y.Z) — see RELEASING.md.
# workflow_dispatch is supported for dry runs: it builds and pushes an image
# tagged from `git describe`, but does NOT create a GitHub Release.
#
# Outputs:
#   - Container image -> ghcr.io/<owner>/securityportal-api  (multi-tag)
#   - Build-provenance + SBOM attestations on the pushed image digest (keyless,
#     via OIDC — verifiable with `gh attestation verify oci://<image> --owner <owner>`)
#   - GitHub Release with the linux/amd64 binary tarball + SPDX & CycloneDX SBOMs
#
# Owner is derived from ${{ github.repository_owner }}, so a fork publishes under
# the fork's own namespace with no edits and no secrets beyond GITHUB_TOKEN.
#
# Actions are pinned to full commit SHAs; the trailing comment is the version
# Dependabot tracks (github-actions ecosystem in .github/dependabot.yml).

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release and upload assets
  packages: write # push the image to GHCR
  id-token: write # keyless signing identity for attestations (OIDC)
  attestations: write # record build-provenance / SBOM attestations

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/securityportal-api

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags so `git describe` can derive a version on
          # workflow_dispatch runs (tag pushes already carry the version).
          fetch-depth: 0

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --always --dirty)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${version}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build linux/amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o dist/securityportal-api \
            ./cmd/securityportal-api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./docker/api/Dockerfile
          # linux/amd64 only by default — matches the compose/Helm deployment
          # target and avoids slow QEMU builds. To add arm64, the Dockerfile must
          # cross-compile via $TARGETARCH; then set:
          #   platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: dist/securityportal-api-sbom.spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: dist/securityportal-api-sbom.cdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: dist/securityportal-api-sbom.spdx.json
          push-to-registry: true

      - name: Package & push Helm chart (OCI)
        if: github.ref_type == 'tag'
        env:
          CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts
        run: |
          # Strip the leading "v" — chart/SemVer versions are bare (0.1.0).
          v="${GITHUB_REF_NAME#v}"
          chart=deploy/helm/securityportal
          # `helm dependency build` resolves the dep URL against the local repo
          # cache, so the Bitnami repo must be added even though the URL is in
          # Chart.yaml. Pulls the pinned subchart from Chart.lock into charts/.
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build "${chart}"
          helm package "${chart}" --version "${v}" --app-version "${v}" -d dist
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          helm push "dist/securityportal-${v}.tgz" "${CHART_REGISTRY}"

      - name: Package release tarball
        if: github.ref_type == 'tag'
        run: |
          v="${{ steps.ver.outputs.version }}"
          stage="securityportal-api-${v}-linux-amd64"
          mkdir -p "${stage}"
          cp dist/securityportal-api "${stage}/"
          cp README.md LICENSE CHANGELOG.md "${stage}/" 2>/dev/null || true
          cp dist/securityportal-api-sbom.spdx.json dist/securityportal-api-sbom.cdx.json "${stage}/"
          tar -czf "dist/${stage}.tar.gz" "${stage}"
          echo "Packaged dist/${stage}.tar.gz"

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/securityportal-api-*-linux-amd64.tar.gz
            dist/securityportal-api-sbom.spdx.json
            dist/securityportal-api-sbom.cdx.json

services:
  db:
    container_name: "securityportal-db"
    image: library/postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - securityportal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    container_name: "securityportal-api"
    build:
      context: ..
      dockerfile: ./docker/api/Dockerfile
      args:
        BUILD_VERSION: v0.0.0
    networks:
      - securityportal
    environment:
      SECURITYPORTAL_PROVIDER_URL: ${SECURITYPORTAL_PROVIDER_URL}
      SECURITYPORTAL_PUBLISHABLE_TLP: ${SECURITYPORTAL_PUBLISHABLE_TLP}
      SECURITYPORTAL_POLL_INTERVAL: ${SECURITYPORTAL_POLL_INTERVAL}
      # DSN is derived from the POSTGRES_* vars above by default.
      # Set SECURITYPORTAL_DATABASE_DSN explicitly only when you need to
      # override the auto-derived value — e.g. an external (non-bundled) DB
      # host, or a password that contains URL-reserved characters that require
      # percent-encoding (RFC 3986 §2.1).
      SECURITYPORTAL_DATABASE_DSN: "${SECURITYPORTAL_DATABASE_DSN:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable}"
      SECURITYPORTAL_LISTEN: ":8081"
      # Same-origin deployment via Caddy: CORS headers are not needed because the
      # browser always talks to Caddy (same origin), not the API directly.
      # Leave SECURITYPORTAL_CORS_ORIGINS unset or empty (ADR-0011).
    # No host-port publish: api is only reachable through Caddy (SA-21).
    # To access the API directly during development, use docker compose exec or
    # add a ports override in a local docker-compose.override.yml.
    depends_on:
      db:
        condition: service_healthy

  web:
    container_name: "securityportal-web"
    build:
      context: ../../securityportal-web
      dockerfile: ./Dockerfile
    networks:
      - securityportal
    environment:
      # SSR load functions call the API directly via the internal Docker network
      # rather than going through Caddy (ADR-0011 / task 33).
      SECURITYPORTAL_API_INTERNAL_URL: "http://api:8081"
      # Same-origin deployment: PUBLIC_API_BASE_URL is empty so the browser
      # issues relative /api/... requests, which Caddy routes to api:8081.
      PUBLIC_API_BASE_URL: ""
    # No host-port publish: web is only reachable through Caddy (SA-21).
    depends_on:
      - api

  caddy:
    container_name: "securityportal-caddy"
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - securityportal
    ports:
      # Only Caddy publishes host ports; api and web are internal-network only.
      - "80:80"
      - "443:443"
    environment:
      # Site address for the Caddy site block; Caddyfile default is "localhost".
      # Set to the public FQDN for production (MODE 2 / ACME).
      SP_SITE_ADDRESS: "${SP_SITE_ADDRESS:-localhost}"
      # SP_ACME_EMAIL pass-through: when set in the host env or .env, Docker
      # Compose forwards it into the container and Caddy uses it as the ACME
      # registration email (MODE 2 — Let's Encrypt).  When it is absent from the
      # host environment the env var is not present inside the container, and
      # Caddy's {$SP_ACME_EMAIL:internal} placeholder defaults to "internal"
      # (MODE 1 — self-signed).  A null value here (no ":" suffix) means
      # pass-through; it does NOT set the variable to empty, so Caddy's fallback
      # fires correctly.
      SP_ACME_EMAIL:
      # Rate-limit tuning (SA-26 / C-14 / ADR-0011).
      # Caddy reads these from its container environment via the
      # {$SP_RATE_LIMIT_REQUESTS:60} / {$SP_RATE_LIMIT_WINDOW:1m} placeholders in
      # the Caddyfile.  Passing them here ensures that operator overrides set in
      # .env (or docker/.env) actually reach the Caddy process; without this
      # pass-through only the Caddyfile compile-time defaults would apply.
      SP_RATE_LIMIT_REQUESTS: "${SP_RATE_LIMIT_REQUESTS:-60}"
      SP_RATE_LIMIT_WINDOW: "${SP_RATE_LIMIT_WINDOW:-1m}"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Persistent certificate storage — required for ACME and self-signed CA.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

networks:
  securityportal:
    name: securityportal

volumes:
  db-data:
  caddy_data:
  caddy_config:
